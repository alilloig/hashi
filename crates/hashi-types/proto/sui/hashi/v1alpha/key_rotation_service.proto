syntax = "proto3";

package sui.hashi.v1alpha;

import "sui/rpc/v2/bcs.proto";

service KeyRotationService {
  // Send rotation messages to a party and receive their signature.
  rpc SendRotationMessages(SendRotationMessagesRequest) returns (SendRotationMessagesResponse);

  // Retrieve a dealer's rotation messages from the certificate signers.
  rpc RetrieveRotationMessages(RetrieveRotationMessagesRequest) returns (RetrieveRotationMessagesResponse);

  // Get public DKG output for an epoch.
  rpc GetPublicDkgOutput(GetPublicDkgOutputRequest) returns (GetPublicDkgOutputResponse);

  // Send a complaint about invalid shares for a specific share index and receive the correct shares.
  rpc RotationComplain(RotationComplainRequest) returns (RotationComplainResponse);
}

message SendRotationMessagesRequest {
  // The epoch for this rotation instance.
  optional uint64 epoch = 1;

  // The rotation messages keyed by share index.
  map<uint32, sui.rpc.v2.Bcs> messages = 2;
}

message SendRotationMessagesResponse {
  // The BLS12-381 signature from the receiving validator.
  optional bytes signature = 1;
}

message RetrieveRotationMessagesRequest {
  // The epoch for this rotation instance.
  optional uint64 epoch = 1;

  // The hex-encoded Sui address of the dealer whose messages are requested.
  optional string dealer = 2;
}

message RetrieveRotationMessagesResponse {
  // The rotation messages keyed by share index.
  map<uint32, sui.rpc.v2.Bcs> messages = 1;
}

message GetPublicDkgOutputRequest {
  // The epoch for which to retrieve the public DKG output.
  optional uint64 epoch = 1;
}

message GetPublicDkgOutputResponse {
  // The aggregated public key.
  optional sui.rpc.v2.Bcs public_key = 1;

  // The commitments keyed by share index.
  map<uint32, sui.rpc.v2.Bcs> commitments = 2;
}

message RotationComplainRequest {
  // The epoch for this rotation instance.
  optional uint64 epoch = 1;

  // The hex-encoded Sui address of the dealer who sent invalid shares.
  optional string dealer = 2;

  // The share index that triggered the complaint.
  optional uint32 share_index = 3;

  // The complaint containing proof of invalid share.
  optional sui.rpc.v2.Bcs complaint = 4;
}

message RotationShareComplaintResponse {
  // The share index for which the response is provided.
  optional uint32 share_index = 1;

  // The complaint response containing the responder's share.
  optional sui.rpc.v2.Bcs response = 2;
}

message RotationComplainResponse {
  // Response containing complaint responses for all shares the responder has.
  // May not include all dealer's shares if responder is also missing some.
  repeated RotationShareComplaintResponse responses = 1;
}
